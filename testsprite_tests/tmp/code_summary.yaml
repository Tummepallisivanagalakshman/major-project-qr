version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 18
  - Vite
  - React Router v6
  - Tailwind CSS 3.4
  - InsForge SDK (@insforge/sdk)
  - Framer Motion
  - QRCode.react
  - html5-qrcode
  - Recharts
  - Lucide React
  - React Hot Toast

routes:
  - path: /
    file: src/App.tsx
    auth_required: false
    description: Root route - shows LandingPage if not logged in, AdminDashboard for admins, StudentDashboard for students
  - path: /login
    file: src/components/Login.tsx
    auth_required: false
    description: Email/password login page for students and admins
  - path: /signup
    file: src/components/Signup.tsx
    auth_required: false
    description: Student registration page with student ID, email, full name, phone

features:
  - name: Landing Page
    description: Public landing page shown to unauthenticated users with navigation to login/signup
    files:
      - src/components/LandingPage.tsx
    entry_route: /
    user_interactions:
      - View landing page hero section
      - Click Login button to navigate to /login
      - Click Sign Up button to navigate to /signup
    api_calls: []
    auth_required: false

  - name: User Login
    description: Email and password login via InsForge auth, supports both admin and student roles
    files:
      - src/components/Login.tsx
      - src/lib/api.ts
      - src/lib/insforge.ts
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Login button to submit
      - See error message on invalid credentials
      - Redirected to dashboard on success
    api_calls:
      - method: POST
        endpoint: InsForge auth.signInWithPassword
      - method: GET
        endpoint: InsForge database profiles (select by id)
    auth_required: false

  - name: Student Registration
    description: Student signup form with role auto-assignment based on email domain
    files:
      - src/components/Signup.tsx
      - src/lib/api.ts
    entry_route: /signup
    user_interactions:
      - Fill full name, email, password, student ID, phone fields
      - Click Sign Up button
      - See success or error notification
    api_calls:
      - method: POST
        endpoint: InsForge auth.signUp
      - method: POST
        endpoint: InsForge database profiles (insert)
    auth_required: false

  - name: Student Dashboard
    description: Dashboard with QR code generation, meal history, payment info, notifications, and profile management
    files:
      - src/components/StudentDashboard.tsx
      - src/lib/api.ts
    entry_route: /
    user_interactions:
      - View QR code for meal access
      - View meal history / logs
      - View payment summary
      - View notifications
      - View weekly menu
      - Edit profile information
      - Click logout
    api_calls:
      - method: GET
        endpoint: InsForge database meal_records (by student_id)
      - method: GET
        endpoint: InsForge database payments (by student_id)
      - method: GET
        endpoint: InsForge database notifications
      - method: GET
        endpoint: InsForge database menu
      - method: PATCH
        endpoint: InsForge database profiles (update)
    auth_required: true

  - name: QR Code Generation
    description: Generates time/meal-specific QR codes for students to present at the hostel cafeteria
    files:
      - src/components/StudentDashboard.tsx
    entry_route: /
    user_interactions:
      - View QR code for Breakfast, Lunch, or Dinner
      - QR code updates based on meal type and time period
    api_calls: []
    auth_required: true

  - name: Admin Dashboard - Overview
    description: Admin overview with statistics on students, payments, rooms, and daily meal counts
    files:
      - src/components/AdminDashboard.tsx
      - src/components/admin/Overview.tsx
      - src/lib/api.ts
    entry_route: /
    user_interactions:
      - View total students, active students, payment stats
      - View today's meal counts per meal type
      - View room occupancy summary
    api_calls:
      - method: GET
        endpoint: InsForge database profiles (stats)
      - method: GET
        endpoint: InsForge database payments (aggregate)
      - method: GET
        endpoint: InsForge database meal_records (today)
      - method: GET
        endpoint: InsForge database rooms
    auth_required: true

  - name: Admin Dashboard - Student Management
    description: Admin can view, search, update, block/unblock, and delete students
    files:
      - src/components/admin/StudentManagement.tsx
      - src/lib/api.ts
    entry_route: /
    user_interactions:
      - View list of all students
      - Search students by name or ID
      - Update student status (Active/Blocked)
      - Delete a student record
      - Edit student profile details
    api_calls:
      - method: GET
        endpoint: InsForge database profiles (role=student)
      - method: PATCH
        endpoint: InsForge database profiles (update status)
      - method: DELETE
        endpoint: InsForge database profiles (delete by id)
    auth_required: true

  - name: Admin Dashboard - Room Management
    description: Admin can view, add, edit, and delete rooms; view room occupancy
    files:
      - src/components/admin/RoomManagement.tsx
      - src/lib/api.ts
    entry_route: /
    user_interactions:
      - View list of rooms with occupancy
      - Click Add Room to create a new room entry
      - Click Edit icon to update room details
      - Click Delete icon to remove a room
    api_calls:
      - method: GET
        endpoint: InsForge database rooms
      - method: POST
        endpoint: InsForge database rooms (insert)
      - method: PATCH
        endpoint: InsForge database rooms (update by id)
      - method: DELETE
        endpoint: InsForge database rooms (delete by id)
    auth_required: true

  - name: Admin Dashboard - Payment Management
    description: Admin views all payment records with student name and amount
    files:
      - src/components/admin/PaymentManagement.tsx
      - src/lib/api.ts
    entry_route: /
    user_interactions:
      - View list of all payments
      - Filter payments by date or student
    api_calls:
      - method: GET
        endpoint: InsForge database payments (with profiles join)
    auth_required: true

  - name: Admin Dashboard - Meal Logs
    description: Admin views all meal access records with student info
    files:
      - src/components/admin/MealLogs.tsx
      - src/lib/api.ts
    entry_route: /
    user_interactions:
      - View all meal log entries
      - Filter by date or student name
    api_calls:
      - method: GET
        endpoint: InsForge database meal_records (with profiles join)
    auth_required: true

  - name: Admin Dashboard - Notifications
    description: Admin broadcasts notifications to all or specific students
    files:
      - src/components/admin/Notifications.tsx
      - src/lib/api.ts
    entry_route: /
    user_interactions:
      - Fill notification title, message, and type
      - Optionally specify target student ID
      - Click Send to broadcast
    api_calls:
      - method: POST
        endpoint: InsForge database notifications (insert)
    auth_required: true

  - name: Admin Dashboard - Rules Management
    description: Admin creates and manages hostel rules and announcements
    files:
      - src/components/admin/Rules.tsx
      - src/lib/api.ts
    entry_route: /
    user_interactions:
      - View list of hostel rules
      - Add a new rule
      - Edit an existing rule
      - Delete a rule
    api_calls:
      - method: GET
        endpoint: InsForge database rules
      - method: POST
        endpoint: InsForge database rules (insert)
      - method: PATCH
        endpoint: InsForge database rules (update by id)
      - method: DELETE
        endpoint: InsForge database rules (delete by id)
    auth_required: true

  - name: Admin Dashboard - Menu Management
    description: Admin updates the weekly meal menu visible to students
    files:
      - src/components/MenuLogs.tsx
      - src/lib/api.ts
    entry_route: /
    user_interactions:
      - View current weekly menu
      - Edit menu items per day
      - Save menu changes
    api_calls:
      - method: GET
        endpoint: InsForge database menu
      - method: PATCH
        endpoint: InsForge database menu (upsert by day)
    auth_required: true

  - name: Admin Dashboard - Reports
    description: Admin views charts for meal counts and revenue over time
    files:
      - src/components/admin/Reports.tsx
      - src/lib/api.ts
    entry_route: /
    user_interactions:
      - View meal usage bar chart by date
      - View revenue line chart by date
    api_calls:
      - method: GET
        endpoint: InsForge database meal_records (aggregate by date)
      - method: GET
        endpoint: InsForge database payments (aggregate by date)
    auth_required: true

  - name: Admin Dashboard - Settings
    description: Admin and students can update profile settings
    files:
      - src/components/admin/Settings.tsx
      - src/lib/api.ts
    entry_route: /
    user_interactions:
      - Edit full name, phone number
      - Click Save to update profile
    api_calls:
      - method: PATCH
        endpoint: InsForge database profiles (update by id)
    auth_required: true

  - name: QR Scanner (Admin)
    description: Admin scans student QR codes to validate and record meal access
    files:
      - src/components/QRScanner.tsx
      - src/lib/api.ts
    entry_route: /
    user_interactions:
      - Open QR scanner camera view
      - Scan student QR code
      - See access granted or denied result with reason
    api_calls:
      - method: GET
        endpoint: InsForge database profiles (validate student)
      - method: POST
        endpoint: InsForge database meal_records (insert on success)
    auth_required: true

  - name: Logout
    description: Clears auth session and redirects to landing page
    files:
      - src/App.tsx
      - src/lib/api.ts
    entry_route: /
    user_interactions:
      - Click Logout button in dashboard nav
      - Redirected to landing page
    api_calls:
      - method: POST
        endpoint: InsForge auth.signOut
    auth_required: true

known_limitations:
  - issue: Role is determined by email domain (@gmail.com = admin) which is insecure for production
    location: src/App.tsx and src/lib/api.ts
    impact: Any gmail user is treated as admin; acceptable for demo/testing environment
  - issue: Password change requires sign-out and reset-password flow (no in-app password update)
    location: src/lib/api.ts changePassword function
    impact: Users cannot change passwords directly from the settings page
  - issue: Room occupancy calculation is done client-side by cross-referencing profiles
    location: src/lib/api.ts getRooms function
    impact: Occupancy count may be inaccurate if room_number field is not consistently set
