version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: qr_hostel_backend
    volumes:
      # Persists the database safely across container rebuilds
      - ./hostel_system.db:/app/hostel_system.db
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: qr_hostel_frontend
    ports:
      # Expose NGINX production server on default HTTP port 80
      - "80:80"
    depends_on:
      - backend
    restart: always
